name: Update Dashboard

# Note: XSERVER WAF が GitHub Actions の IP をブロックするため、
# 自動同期は Mac の launchd でローカル実行する運用にしています。
# WAF が解除されたら下の schedule をアンコメントしてください。
on:
  workflow_dispatch: {}  # 手動実行のみ
  # schedule:
  #   - cron: '0 23 * * *'  # 毎朝8時 (JST)

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate dashboard
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: npm run dashboard

      - name: Encrypt with password (if DASHBOARD_PASSWORD is set)
        env:
          STATICRYPT_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "DASHBOARD_PASSWORD not set, skipping encryption"
            exit 0
          fi
          npx --yes staticrypt docs/index.html docs/dashboard.html \
            -d /tmp/encrypted --short \
            --template-color-primary '#1a73e8' \
            --template-color-secondary '#1a73e8' \
            --template-button 'ダッシュボードを開く' \
            --template-instructions 'YOLO MEDIA 記事管理ダッシュボード（パスワード保護）' \
            --template-title 'YOLO MEDIA Dashboard'
          mv /tmp/encrypted/index.html docs/index.html
          mv /tmp/encrypted/dashboard.html docs/dashboard.html

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard.html docs/index.html
          git diff --staged --quiet || git commit -m "chore: update dashboard $(date -u +%Y-%m-%d)"
          git push
